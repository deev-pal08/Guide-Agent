# Guide Agent — configuration example
# Copy to config.yaml and customize. config.yaml is gitignored.

about_me: "AboutMe.md"

# LLM models per stage
llm:
  conversation_model: "claude-haiku-4-5"   # Cheap propose/iterate loop
  planner_model: "claude-sonnet-4-6"        # Daily plan generation per phase
  research_model: "claude-opus-4-8"         # Research phase (gap analysis etc.)
  max_tokens: 16384

# Email — outbound briefing
email:
  enabled: true
  from_address: "guide@yourdomain.com"
  to_addresses:
    - "you@gmail.com"

# IMAP — inbound reply polling
imap:
  enabled: true
  server: "imap.gmail.com"
  port: 993
  mailbox: "INBOX"

# Newsletter Agent integration (read-only)
newsletter:
  enabled: true
  project_dir: "~/Desktop/personal/newsletter-agent"

# Web search providers
search:
  enabled: true
  max_results: 5
  brave:
    enabled: true
    api_key_env: "BRAVE_API_KEY"
  tavily:
    enabled: true
    api_key_env: "TAVILY_API_KEY"
  exa:
    enabled: true
    api_key_env: "EXA_API_KEY"

